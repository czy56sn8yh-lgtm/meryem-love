<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meryem ❤️</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

h1{
margin-top:30px;
font-size:38px;
}

#slider{
width:90%;
max-width:400px;
height:500px;
margin:20px auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px red;
}

#slider img{
width:100%;
height:100%;
object-fit:cover;
}

button{
padding:15px 25px;
border:none;
border-radius:15px;
background:red;
color:white;
font-size:18px;
cursor:pointer;
}

.heart{
position:fixed;
color:red;
font-size:25px;
animation:fly 4s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<h1>Meryem ❤️</h1>

<h3>12 Eylül 2025 💌</h3>

<div id="slider">
<img id="foto" src="IMG_1285.png">
</div>

<p>Kalbime Gömdüm ❤️</p>

<button onclick="kalp()">Bana Tıkla ❤️</button>

<script>

const photos=[
"IMG_1285.png",
"20546f1b-f2fe-43d1-bae5-0d27661e12b",
"ef1617d0-4066-4f52-a3c5-649c55bda0",
"ce29bc28-e74a-4596-aecb-4359d43b6",
"0AF2EBBD-3E12-450F-85F3-050D03C8"
];

let i=0;

setInterval(()=>{
i=(i+1)%photos.length;
document.getElementById("foto").src=photos[i];
},3000);

function kalp(){
for(let j=0;j<20;j++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},4000);
}
}

</script>

</body>
</html>
