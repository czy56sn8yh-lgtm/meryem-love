<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meryem ❤️</title>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#ff5fa2,#ff9ac8);
  font-family:Arial,sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;
}

h1{font-size:52px;margin:25px 0 10px;}
p{font-size:24px;}

#slider{
  width:88%;
  height:430px;
  margin:20px auto;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(255,255,255,.5);
}

#foto{
  width:100%;
  height:100%;
  object-fit:cover;
}

button{
  padding:16px 28px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff2f85;
  font-size:22px;
  font-weight:bold;
}

.heart{
  position:fixed;
  pointer-events:none;
  z-index:9999;
  filter:blur(0px);
}
</style>
</head>

<body>

<h1>Meryem ❤️</h1>
<p>12 Eylül 2025'ten beri ❤️</p>
<p>10 aydır beraberiz 💕</p>

<div id="slider">
  <img id="foto" src="IMG_1285.png">
</div>

<button onclick="kalp()">Bana Tıkla ❤️</button>

<script>
const fotolar=[
"IMG_1285.png",
"0AF2EBBD-3E12-450F-85F3-050D03C8C5F1.png",
"20546f1b-f2fe-43d1-bae5-0d27661e12b9.jpeg",
"ce29bc28-e74a-4596-aecb-4359d43b6d0d.jpeg",
"ef1617d0-4066-4f52-a3c5-649c55bda09e.jpeg"
];

let sira=0;
setInterval(()=>{
  sira=(sira+1)%fotolar.length;
  document.getElementById("foto").src=fotolar[sira];
},3000);

function kalp(){
  for(let i=0;i<45;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left="50%";
    h.style.top="55%";
    h.style.fontSize=(18+Math.random()*30)+"px";

    document.body.appendChild(h);

    let x=(Math.random()-0.5)*700;
    let y=(Math.random()-0.5)*700;

    h.animate([
      {transform:"translate(-50%,-50%) scale(.5)", opacity:1, filter:"blur(0px)"},
      {transform:`translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1.4)`, opacity:.65, filter:"blur(1px)"},
      {transform:`translate(calc(-50% + ${x*1.15}px), calc(-50% + ${y*1.15}px)) scale(0)`, opacity:0, filter:"blur(6px)"}
    ],{
      duration:1400,
      easing:"cubic-bezier(.16,1,.3,1)"
    });

    setTimeout(()=>h.remove(),1400);
  }
}
</script>

</body>
</html>
